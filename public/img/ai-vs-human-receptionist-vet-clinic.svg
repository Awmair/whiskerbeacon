<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200" font-family="'Inter', -apple-system, sans-serif">
  <defs>
    <linearGradient id="tealGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1C4A46"/>
      <stop offset="1" stop-color="#163B38"/>
    </linearGradient>
  </defs>

  <!-- bg -->
  <rect width="1200" height="1200" fill="#FAF4E7"/>

  <!-- header -->
  <text x="600" y="118" text-anchor="middle" font-family="'Fraunces', Georgia, serif" font-size="60" font-weight="600" fill="#1C4A46">AI vs Human Receptionist</text>
  <text x="600" y="168" text-anchor="middle" font-size="26" fill="#1C4A46" opacity="0.7">The honest split for a veterinary front desk</text>
  <line x1="470" y1="196" x2="730" y2="196" stroke="#C97E3C" stroke-width="3"/>

  <!-- ===== AI COLUMN ===== -->
  <rect x="70" y="240" width="510" height="740" rx="28" fill="url(#tealGrad)"/>
  <text x="325" y="316" text-anchor="middle" font-family="'Fraunces', Georgia, serif" font-size="40" font-weight="600" fill="#F5EFE4">The AI wins on</text>
  <text x="325" y="356" text-anchor="middle" font-size="22" fill="#9FD8C4" letter-spacing="1">VOLUME &amp; COVERAGE</text>

  <!-- ai item 1 -->
  <circle cx="130" cy="430" r="9" fill="#9FD8C4"/>
  <text x="162" y="424" font-size="27" font-weight="600" fill="#F5EFE4">Never clocks off</text>
  <text x="162" y="458" font-size="21" fill="#F5EFE4" opacity="0.75">Answers 2am and after-hours calls,</text>
  <text x="162" y="486" font-size="21" fill="#F5EFE4" opacity="0.75">no overtime, no bank holidays.</text>

  <!-- ai item 2 -->
  <circle cx="130" cy="546" r="9" fill="#9FD8C4"/>
  <text x="162" y="540" font-size="27" font-weight="600" fill="#F5EFE4">Many calls at once</text>
  <text x="162" y="574" font-size="21" fill="#F5EFE4" opacity="0.75">Every line, text and web enquiry</text>
  <text x="162" y="602" font-size="21" fill="#F5EFE4" opacity="0.75">in parallel, never one at a time.</text>

  <!-- ai item 3 -->
  <circle cx="130" cy="662" r="9" fill="#9FD8C4"/>
  <text x="162" y="656" font-size="27" font-weight="600" fill="#F5EFE4">Never skips the grind</text>
  <text x="162" y="690" font-size="21" fill="#F5EFE4" opacity="0.75">Works the recall and follow-up</text>
  <text x="162" y="718" font-size="21" fill="#F5EFE4" opacity="0.75">list every single day.</text>

  <!-- ai item 4 -->
  <circle cx="130" cy="778" r="9" fill="#9FD8C4"/>
  <text x="162" y="772" font-size="27" font-weight="600" fill="#F5EFE4">Flat, predictable cost</text>
  <text x="162" y="806" font-size="21" fill="#F5EFE4" opacity="0.75">One monthly fee, 24 hours,</text>
  <text x="162" y="834" font-size="21" fill="#F5EFE4" opacity="0.75">no benefits or turnover.</text>

  <!-- ai cost chip -->
  <rect x="130" y="882" width="390" height="66" rx="14" fill="#9FD8C4"/>
  <text x="325" y="924" text-anchor="middle" font-size="25" font-weight="700" fill="#163B38">Flat monthly fee, 24/7</text>

  <!-- ===== HUMAN COLUMN ===== -->
  <rect x="620" y="240" width="510" height="740" rx="28" fill="#FFFFFF" stroke="#E5DCC9" stroke-width="2"/>
  <text x="875" y="316" text-anchor="middle" font-family="'Fraunces', Georgia, serif" font-size="40" font-weight="600" fill="#1C4A46">The human wins on</text>
  <text x="875" y="356" text-anchor="middle" font-size="22" fill="#C97E3C" letter-spacing="1">JUDGMENT &amp; PRESENCE</text>

  <!-- human item 1 -->
  <circle cx="680" cy="430" r="9" fill="#C97E3C"/>
  <text x="712" y="424" font-size="27" font-weight="600" fill="#1C4A46">Empathy in hard moments</text>
  <text x="712" y="458" font-size="21" fill="#1C4A46" opacity="0.7">The failing-pet call needs a</text>
  <text x="712" y="486" font-size="21" fill="#1C4A46" opacity="0.7">person, never a machine.</text>

  <!-- human item 2 -->
  <circle cx="680" cy="546" r="9" fill="#C97E3C"/>
  <text x="712" y="540" font-size="27" font-weight="600" fill="#1C4A46">Reads what is not said</text>
  <text x="712" y="574" font-size="21" fill="#1C4A46" opacity="0.7">Hears the worry under a routine</text>
  <text x="712" y="602" font-size="21" fill="#1C4A46" opacity="0.7">question and flags it.</text>

  <!-- human item 3 -->
  <circle cx="680" cy="662" r="9" fill="#C97E3C"/>
  <text x="712" y="656" font-size="27" font-weight="600" fill="#1C4A46">The physical front desk</text>
  <text x="712" y="690" font-size="21" fill="#1C4A46" opacity="0.7">Greets the nervous spaniel, takes</text>
  <text x="712" y="718" font-size="21" fill="#1C4A46" opacity="0.7">payment, hands over meds.</text>

  <!-- human item 4 -->
  <circle cx="680" cy="778" r="9" fill="#C97E3C"/>
  <text x="712" y="772" font-size="27" font-weight="600" fill="#1C4A46">Judgment on edge cases</text>
  <text x="712" y="806" font-size="21" fill="#1C4A46" opacity="0.7">The awkward, no-script situation</text>
  <text x="712" y="834" font-size="21" fill="#1C4A46" opacity="0.7">a human improvises through.</text>

  <!-- human cost chip -->
  <rect x="680" y="882" width="390" height="66" rx="14" fill="#F5EFE4" stroke="#C97E3C" stroke-width="1.5"/>
  <text x="875" y="915" text-anchor="middle" font-size="22" font-weight="700" fill="#1C4A46">~$40k to $55k/yr loaded</text>
  <text x="875" y="940" text-anchor="middle" font-size="16" fill="#1C4A46" opacity="0.6">one shift, not 24 hours</text>

  <!-- ===== BOTTOM VERDICT ===== -->
  <rect x="70" y="1016" width="1060" height="120" rx="24" fill="#1C4A46"/>
  <text x="600" y="1066" text-anchor="middle" font-family="'Fraunces', Georgia, serif" font-size="30" font-weight="600" fill="#F5EFE4">The honest answer is both, doing what each does best.</text>
  <text x="600" y="1106" text-anchor="middle" font-size="21" fill="#9FD8C4">AI covers the volume and the gaps. Your team covers the moments that need a person.</text>

  <!-- footer -->
  <text x="600" y="1176" text-anchor="middle" font-size="19" fill="#1C4A46" opacity="0.55">WhiskerBeacon · whiskerbeacon.com · Salary: US industry estimates, Indeed / Glassdoor / Salary.com 2025 to 2026</text>
</svg>
